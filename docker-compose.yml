version: "3.9"

services:
  app:
    build:
      context: ./bezkoder-app
      dockerfile: Dockerfile
      target: production
    container_name: node_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${POSTGRESDB_USER}
      DB_PASSWORD: ${POSTGRESDB_ROOT_PASSWORD}
      DB_NAME: ${POSTGRESDB_DATABASE}
    restart: always
    networks:
      - bezkoder
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bezkoder:
    driver: bridge
