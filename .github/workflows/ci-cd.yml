name: Deploy to EC2 via ECR

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 529966364089.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: bezkoder-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker image
        run: |
          docker build \
            -f bezkoder-app/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            ./bezkoder-app

      - name: Push Docker image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            AWS_REGION=${{ env.AWS_REGION }}
            ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            ECR_REPOSITORY=${{ env.ECR_REPOSITORY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}

            IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            echo "Deploying image: $IMAGE"

            cp /home/ubuntu/app/.env.production /home/ubuntu/bezkoder-app/bezkoder-app/.env.production
            

            # Login to ECR
            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

            # Export image for docker-compose
            export IMAGE=$IMAGE
            # Always use production config as base
            cd /home/ubuntu/bezkoder-app/bezkoder-app
            cp .env.production .env

            # Restart containers
            docker compose down || true
            docker compose pull || true
            docker compose up -d
